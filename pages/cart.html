<!DOCTYPE html><html lang="en"><script>!function(){var t=localStorage.getItem('homehut_theme')||'light';document.documentElement.setAttribute('data-theme',t)}();</script><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Shopping Cart — HomeHut</title><meta name="description" content="Review your cart and proceed to checkout. Free shipping on orders above ₹999."><link rel="icon" type="image/svg+xml" href="../images/favicon.svg"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link rel="stylesheet" href="../css/design-system.css"><link rel="stylesheet" href="../css/components.css"><link rel="stylesheet" href="../css/pages.css"></head><body><a href="#main-content" class="skip-link">Skip to main content</a><header class="navbar" id="navbar"><div class="container"><div class="navbar__inner"><a href="../index.html" class="navbar__logo" aria-label="HomeHut Home"><img src="../images/logo.svg" alt="HomeHut" class="navbar__logo-img" width="150" height="42"></a><nav class="navbar__nav"><a href="../index.html" class="navbar__link">Home</a><a href="shop.html" class="navbar__link">Shop</a><a href="about.html" class="navbar__link">About</a><a href="contact.html" class="navbar__link">Contact</a></nav><div class="navbar__actions"><button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode"><svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/></svg><svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button><a href="cart.html" class="navbar__action-btn" aria-label="Cart"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 nd"><div class="footer__logo"><img src="../images/logo.svg" alt="HomeHut" class="footer__logo-img" width="130" height="36"></div><p class="footer__tagline">Smart. Modern. Efficient.</p></div><div><h3 class="footer__heading">Quick Links</h3><div class="footer__links"><a href="shop.html" class="footer__link">Shop</a><a href="about.html" class="footer__link">About</a><a href="contact.html" class="footer__link">Contact</a></div></div></div><div class="footer__bottom"><div class="footer__bottom-inner"><p class="footer__copyright">&copy; 2026 HomeHut</p></div></div></div></footer><div class="toast-container" id="toast-container"></div><script src="../js/data.js"></script><script src="../js/app.js"></script><script>(function(){'use strict';function renderCart(){const container=document.getElementById('cart-content');const items=HomeHutCart.getItems();if(items.length===0){container.innerHTML='<div class="cart-empty"><div class="cart-empty__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg></div><h2 class="cart-empty__title">Your Cart is Empty</h2><p class="cart-empty__text">Looks like you haven\'t added anything yet. Start browsing!</p><a href="shop.html" class="btn btn-primary btn-lg">Start Shopping</a></div>';return;}const subtotal=HomeHutCart.getTotal();const shipping=subtotal>=HOMEHUT.store.freeShippingThreshold?0:99;const total=subtotal+shipping;const shippingProgress=Math.min((subtotal/HOMEHUT.store.freeShippingThreshold)*100,100);const remaining=HOMEHUT.store.freeShippingThreshold-subtotal;container.innerHTML='<div class="shipping-progress"><p class="shipping-progress__text">'+(remaining>0?'Add ₹'+remaining.toLocaleString('en-IN')+' more for <strong>FREE shipping!</strong>':'🎉 You\'ve unlocked FREE shipping!')+'</p><div class="shipping-progress__bar"><div class="shipping-progress__fill" style="width:'+shippingProgress+'%;"></div></div></div><div class="cart-layout"><div class="cart-items">'+items.map((item,i)=>'<div class="cart-item"><img class="cart-item__image" src="'+item.image+'" alt="'+item.title+'" width="120" height="120" loading="lazy"><div class="cart-item__info"><h3 class="cart-item__title">'+item.title+'</h3><p class="cart-item__price">₹'+item.price.toLocaleString('en-IN')+'</p><div class="cart-item__actions"><div class="qty-stepper"><button class="qty-stepper__btn" onclick="updateCartQty('+i+','+(item.quantity-1)+')" aria-label="Decrease">&minus;</button><span class="qty-stepper__value">'+item.quantity+'</span><button class="qty-stepper__btn" onclick="updateCartQty('+i+','+(item.quantity+1)+')" aria-label="Increase">+</button></div><button class="cart-item__remove" onclick="removeCartItem('+i+')">Remove</button></div></div></div>').join('')+'</div><div class="order-summary"><h2 class="order-summary__title">Order Summary</h2><div class="order-summary__row"><span>Subtotal ('+HomeHutCart.getCount()+' items)</span><span>₹'+subtotal.toLocaleString('en-IN')+'</span></div><div class="order-summary__row"><span>Shipping</span><span>'+(shipping===0?'<span style="color:var(--success);font-weight:600">FREE</span>':'₹'+shipping)+'</span></div><div class="order-summary__row order-summary__row--total"><span>Total</span><span>₹'+total.toLocaleString('en-IN')+'</span></div><button class="btn btn-primary btn-lg btn-full" style="margin-top:var(--space-5)" onclick="showToast(\'Redirecting to secure checkout...\',\'success\')">Proceed to Checkout</button><a href="shop.html" class="btn btn-tertiary btn-full" style="margin-top:var(--space-2)">&larr; Continue Shopping</a></div></div>';const upsellSection=document.getElementById('upsell-section');const upsellGrid=document.getElementById('upsell-grid');const cartProductIds=items.map(i=>i.productId);const upsells=HOMEHUT.products.filter(p=>!cartProductIds.includes(p.id)).slice(0,4);if(upsells.length>0&&upsellSection&&upsellGrid){upsellGrid.innerHTML=upsells.map(p=>renderProductCard(p)).join('');upsellSection.style.display='block';}}window.updateCartQty=function(index,qty){HomeHutCart.updateQuantity(index,qty);renderCart();};window.removeCartItem=function(index){HomeHutCart.remove(index);renderCart();};if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',renderCart);}else{renderCart();}})();</script></body></html>
